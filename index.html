<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSO Palawan DTR (Cloud)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-700: #334155;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--slate-50);
            color: var(--dark); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        #login-overlay {
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 16px; 
            width: 350px; 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .login-card h2 { font-weight: 800; color: var(--dark); margin-bottom: 1.5rem; }

        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1.5px solid var(--slate-200); border-radius: 8px; 
            font-size: 14px; transition: all 0.2s;
            box-sizing: border-box;
        }

        .sidebar { 
            width: 260px; background: white; border-right: 1px solid var(--slate-200);
            padding: 2rem 1.5rem; display: flex; flex-direction: column; 
            height: 100vh; position: sticky; top: 0; 
        }

        .sidebar h2 { font-size: 1.25rem; font-weight: 800; color: var(--primary); border-bottom: 2px solid var(--slate-100); padding-bottom: 1rem; }

        .main-content { flex: 1; padding: 2.5rem; background: var(--slate-50); }
        
        .card { 
            background: white; padding: 2rem; border-radius: 12px; 
            border: 1px solid var(--slate-200); box-shadow: var(--shadow);
            margin-bottom: 2rem; 
        }

        .hidden { display: none !important; }

        .btn { 
            border: none; color: white; font-weight: 600; cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 12px 20px; border-radius: 8px; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        .btn:hover { filter: brightness(110%); transform: translateY(-1px); }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        .btn-outline { background: white; border: 1px solid var(--slate-200); color: var(--slate-700); }
        .btn:disabled { background: var(--slate-200) !important; color: var(--slate-400) !important; cursor: not-allowed; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        th { text-align: left; padding: 14px; background: var(--slate-100); color: var(--slate-700); font-weight: 700; text-transform: uppercase; font-size: 11px; }
        td { padding: 14px; border-bottom: 1px solid var(--slate-100); }

        .staff-tag { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--slate-50); padding: 10px 12px; border-radius: 8px; 
            margin-bottom: 8px; font-size: 13px; border: 1px solid var(--slate-200);
        }

        #clock-card { text-align: center; border-top: 4px solid var(--primary); }
        #statusFeedback { font-size: 0.9rem; padding: 10px; border-radius: 6px; background: #eef2ff; color: var(--primary); display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-size: 1.4rem;">PSO Palawan</h2>
            <p style="color: var(--slate-400); font-size: 14px; margin-top: -15px; margin-bottom: 25px;">Cloud DTR Portal</p>
            
            <div id="admin-login-box" class="hidden">
                <input type="password" id="adminPass" placeholder="Enter Admin Password">
                <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="verifyAdmin()">Access Dashboard</button>
                <p style="font-size:12px; cursor:pointer; color:var(--primary); margin-top: 15px;" onclick="toggleLogin(false)">← Switch to Staff Login</p>
            </div>

            <div id="staff-login-box">
                <label style="font-size: 11px; text-align: left; display: block; color: var(--slate-400); font-weight: 600;">SELECT PERSONNEL</label>
                <select id="userSelect"></select>
                <button class="btn btn-success" style="width:100%; margin-top: 10px;" onclick="login('USER')">Clock In / Out</button>
                <div style="margin: 20px 0; border-top: 1px solid var(--slate-100); position: relative;">
                    <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; font-size: 10px; color: var(--slate-400);">OR</span>
                </div>
                <button class="btn btn-outline" style="width:100%" onclick="toggleLogin(true)">Administrator Access</button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <h2>PSO PALAWAN<br><span style="color:var(--slate-400); font-size: 0.75rem; font-weight: 500;">Cloud Management System</span></h2>
        
        <div id="admin-tools" class="hidden">
            <div style="font-size: 10px; color: var(--slate-400); font-weight: 700; margin-top: 2rem; margin-bottom: 0.75rem; text-transform: uppercase;">Manage Personnel</div>
            <input type="text" id="newStaffName" placeholder="Full Name">
            <button class="btn btn-primary" style="width:100%; margin-bottom: 15px;" onclick="addStaff()">+ Add Member</button>
            <div id="staff-list-admin"></div>
            
            <div style="font-size: 10px; color: var(--slate-400); font-weight: 700; margin-top: 2rem; margin-bottom: 0.75rem; text-transform: uppercase;">Operations</div>
            <button class="btn btn-success" style="width: 100%; margin-bottom: 8px;" onclick="exportToExcel()">Download XLS</button>
            <button class="btn btn-danger" style="width: 100%; margin-top: 10px;" onclick="clearAllLogs()">Clear All Logs</button>
        </div>

        <div id="user-info" class="hidden" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--slate-100);">
            <p style="font-size: 10px; color: var(--slate-400); margin-bottom: 4px; font-weight: 700;">ACTIVE SESSION</p>
            <h3 id="displayUserName" style="margin: 0; color: var(--dark); font-size: 1rem;">--</h3>
            <button class="btn btn-outline" style="margin-top: 20px; width: 100%; font-size: 10px;" onclick="location.reload()">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <div id="admin-view" class="hidden">
            <div class="card">
                <h4 style="color: var(--dark); margin-top:0;">📋 Attendance History (Cloud)</h4>
                <div style="overflow-x: auto; margin-top: 20px;">
                    <table id="dtrTable">
                        <thead>
                            <tr>
                                <th>Personnel</th><th>Date</th><th>In</th><th>Break Out</th><th>Break In</th><th>Out</th><th>Total</th><th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card hidden" id="clock-card" style="max-width: 480px; margin: 60px auto;">
            <h3 style="margin-top:0; font-weight: 800;">Time Tracking</h3>
            <div style="display: flex; gap: 12px;">
                <button id="btnClockIn" class="btn btn-success" style="flex:1" onclick="clockAction('IN')">Clock In</button>
                <button id="btnBreak" class="btn btn-warning" style="flex:1" onclick="clockAction('BREAK')">Break</button>
                <button id="btnClockOut" class="btn btn-danger" style="flex:1" onclick="clockAction('OUT')">Clock Out</button>
            </div>
            <p id="statusFeedback" style="margin-top: 20px;"></p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkdqDUEOI6gIeCC1_PTBvqqQlcmgvvQ4E",
            authDomain: "pso-palawan-dtr.firebaseapp.com",
            databaseURL: "https://pso-palawan-dtr-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pso-palawan-dtr",
            storageBucket: "pso-palawan-dtr.firebasestorage.app",
            messagingSenderId: "627132201923",
            appId: "1:627132201923:web:a13a1c47a0f6f0f13d1b76",
            measurementId: "G-E433TPGB63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ADMIN_PASS = "admin123";
        let currentUser = null, userRole = null;
        let staff = [], logs = [], active = {};

        onValue(ref(db, 'pso/'), (snapshot) => {
            const data = snapshot.val() || {};
            
            // Sync Staff List & Ensure Alphabetical Order
            staff = (data.staff || ["Jesus Niño M. Sorima", "Reinell L. Manlapaz"]).sort();
            
            const logsObj = data.logs || {};
            logs = Object.keys(logsObj).map(key => ({...logsObj[key], id: key}));
            logs.sort((a, b) => new Date(b.date + ' ' + b.out) - new Date(a.date + ' ' + a.in));
            
            active = data.active || {};
            
            refreshUI();
        });

        function refreshUI() {
            const userSelect = document.getElementById('userSelect');
            if (userSelect) {
                // Already sorted in the Firebase listener
                userSelect.innerHTML = staff.map(s => `<option value="${s}">${s}</option>`).join('');
            }

            renderStaffList();
            
            if (userRole === 'ADMIN') {
                render(); 
            }
            
            if (currentUser && userRole === 'USER') {
                updateButtonStates();
            }
        }

        window.login = function(role) {
            userRole = role;
            currentUser = (role === 'ADMIN') ? 'Administrator' : document.getElementById('userSelect').value;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('displayUserName').innerText = currentUser;
            document.getElementById('user-info').classList.remove('hidden');
            
            if (role === 'ADMIN') {
                document.getElementById('admin-tools').classList.remove('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                render(); 
            } else {
                document.getElementById('clock-card').classList.remove('hidden');
                updateButtonStates();
            }
        }

        window.clockAction = function(type) {
            const now = Date.now();
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const userKey = currentUser.replace(/\./g, '_');
            let s = active[userKey];
            let fb = document.getElementById('statusFeedback');
            fb.style.display = "block";

            if (type === 'IN') {
                set(ref(db, 'pso/active/' + userKey), { 
                    start: now, startTime: timeStr, date: new Date().toLocaleDateString(), 
                    breakOut: "--", breakIn: "--", breakTotal: 0, onBreak: false 
                });
                fb.innerText = "Shift started at " + timeStr;
            } 
            else if (type === 'BREAK' && s) {
                if (!s.onBreak) {
                    // Start Break
                    update(ref(db, 'pso/active/' + userKey), { breakStart: now, breakOut: timeStr, onBreak: true });
                    fb.innerText = "Break started at " + timeStr;
                } else {
                    // Return from Break - VALIDATION: Must be at least 1 minute (60,000ms)
                    const breakDuration = now - s.breakStart;
                    if (breakDuration < 60000) {
                        alert("Validation: Break duration must be at least 1 minute.");
                        return;
                    }

                    const newTotal = (s.breakTotal || 0) + breakDuration;
                    update(ref(db, 'pso/active/' + userKey), { breakIn: timeStr, breakTotal: newTotal, onBreak: false });
                    fb.innerText = "Returned from break at " + timeStr;
                }
            } 
            else if (type === 'OUT' && s) {
                const logEntry = {
                    name: currentUser, date: s.date, in: s.startTime,
                    bOut: s.breakOut, bIn: s.breakIn, out: timeStr,
                    netMs: (now - s.start) - (s.breakTotal || 0)
                };
                push(ref(db, 'pso/logs'), logEntry);
                remove(ref(db, 'pso/active/' + userKey));
                fb.innerText = "Shift ended at " + timeStr;
            }
        }

        window.addStaff = function() {
            const name = document.getElementById('newStaffName').value.trim();
            if (!name || staff.includes(name)) return alert("Invalid or duplicate name.");
            staff.push(name);
            set(ref(db, 'pso/staff'), staff.sort()); // Sort before saving
            document.getElementById('newStaffName').value = "";
        }

        window.deleteStaff = function(n) {
            if(confirm(`Remove ${n}?`)) {
                const newStaff = staff.filter(x => x !== n);
                set(ref(db, 'pso/staff'), newStaff.sort());
            }
        }

        window.deleteLog = function(id) {
            if(confirm("Delete log?")) remove(ref(db, 'pso/logs/' + id));
        }

        window.clearAllLogs = function() {
            if (confirm("Delete ALL history?")) {
                let confirmation = prompt("Type 'RESET' to confirm");
                if (confirmation === "RESET") {
                    remove(ref(db, 'pso/logs')).then(() => alert("History cleared."));
                }
            }
        }

        function renderStaffList() {
            const container = document.getElementById('staff-list-admin');
            if (container) {
                // staff is already sorted in the listener
                container.innerHTML = staff.map(s => `
                    <div class="staff-tag"><span>${s}</span>
                    <button onclick="deleteStaff('${s}')" style="color:var(--danger); background:none; border:none; cursor:pointer; font-weight:bold;">&times;</button></div>`).join('');
            }
        }

        function render() {
            const tbody = document.getElementById('logTableBody');
            if (!tbody) return;
            tbody.innerHTML = logs.map((l) => `
                <tr>
                    <td><b>${l.name}</b></td><td>${l.date}</td><td style="color:var(--success)">${l.in}</td>
                    <td>${l.bOut}</td><td>${l.bIn}</td><td style="color:var(--danger)">${l.out}</td>
                    <td><span style="background:var(--slate-100); padding:4px 8px; border-radius:4px;">${msToTime(l.netMs)}</span></td>
                    <td><button onclick="deleteLog('${l.id}')" style="color:var(--danger); background:none; border:none; cursor:pointer; font-size:18px;">&times;</button></td>
                </tr>`).join('');
        }

        function updateButtonStates() {
            const userKey = currentUser ? currentUser.replace(/\./g, '_') : null;
            const s = active[userKey];
            const bIn = document.getElementById('btnClockIn'), bBr = document.getElementById('btnBreak'), bOut = document.getElementById('btnClockOut');
            if(!bIn) return;
            bIn.disabled = !!s;
            bBr.disabled = !s;
            bOut.disabled = !s || s?.onBreak;
            if (s) bBr.innerText = s.onBreak ? "Return from Break" : "Break Out";
        }

        function msToTime(ms) {
            let h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
            return `${h}h ${m}m`;
        }

        window.verifyAdmin = () => { if (document.getElementById('adminPass').value === ADMIN_PASS) login('ADMIN'); else alert("Incorrect Password"); };
        window.toggleLogin = (isA) => { 
            document.getElementById('admin-login-box').classList.toggle('hidden', !isA);
            document.getElementById('staff-login-box').classList.toggle('hidden', isA);
        };
        
        window.exportToExcel = () => {
            const table = document.getElementById("dtrTable");
            let html = table.outerHTML.replace(/<th>Action<\/th>/g, "").replace(/<td><button.*?<\/button><\/td>/g, "");
            window.open('data:application/vnd.ms-excel,' + encodeURIComponent(html));
        };
    </script>
</body>
</html>
