<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSO Palawan DTR (WFH)</title>
    <style>
        /* MODERN RE-STYLING */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-700: #334155;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--slate-50);
            color: var(--dark); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        /* Login Overlay Styling */
        #login-overlay {
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 16px; 
            width: 350px; 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .login-card h2 { font-weight: 800; color: var(--dark); margin-bottom: 1.5rem; }

        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1.5px solid var(--slate-200); border-radius: 8px; 
            font-size: 14px; transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none; border-color: var(--primary); ring: 2px solid #6366f133;
        }

        /* Sidebar Styling */
        .sidebar { 
            width: 260px; background: white; border-right: 1px solid var(--slate-200);
            padding: 2rem 1.5rem; display: flex; flex-direction: column; 
            height: 100vh; position: sticky; top: 0; 
        }

        .sidebar h2 { font-size: 1.25rem; font-weight: 800; color: var(--primary); border-bottom: 2px solid var(--slate-100); padding-bottom: 1rem; }

        /* Main Content Styling */
        .main-content { flex: 1; padding: 2.5rem; background: var(--slate-50); }
        
        .card { 
            background: white; padding: 2rem; border-radius: 12px; 
            border: 1px solid var(--slate-200); box-shadow: var(--shadow);
            margin-bottom: 2rem; 
        }

        .hidden { display: none !important; }

        /* Button Styling */
        .btn { 
            border: none; color: white; font-weight: 600; cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 12px 20px; border-radius: 8px; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        .btn:hover { filter: brightness(110%); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        .btn-outline { background: white; border: 1px solid var(--slate-200); color: var(--slate-700); }
        .btn-outline:hover { background: var(--slate-100); }
        
        .btn:disabled { background: var(--slate-200) !important; color: var(--slate-400) !important; cursor: not-allowed; transform: none; }

        /* Table Styling */
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        th { 
            text-align: left; padding: 14px; background: var(--slate-100); 
            color: var(--slate-700); font-weight: 700; text-transform: uppercase; font-size: 11px;
        }
        th:first-child { border-radius: 8px 0 0 0; }
        th:last-child { border-radius: 0 8px 0 0; }
        td { padding: 14px; border-bottom: 1px solid var(--slate-100); }
        tr:hover td { background-color: #fcfcfd; }

        /* Personnel Tag Styling */
        .staff-tag { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--slate-50); padding: 10px 12px; border-radius: 8px; 
            margin-bottom: 8px; font-size: 13px; border: 1px solid var(--slate-200);
            color: var(--dark); font-weight: 500;
        }

        .admin-section-title { 
            font-size: 10px; color: var(--slate-400); font-weight: 700;
            margin-top: 2rem; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
        }

        #staff-list-admin { 
            max-height: 250px; overflow-y: auto; 
            padding-right: 5px; margin-bottom: 1rem;
        }

        /* Clock Card Specifics */
        #clock-card { text-align: center; border-top: 4px solid var(--primary); }
        #statusFeedback { font-size: 0.9rem; padding: 10px; border-radius: 6px; background: #eef2ff; color: var(--primary); }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--slate-200); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-size: 1.4rem;">PSO Palawan</h2>
            <p style="color: var(--slate-400); font-size: 14px; margin-top: -15px; margin-bottom: 25px;">Daily Time Record Portal</p>
            
            <div id="admin-login-box" class="hidden">
                <input type="password" id="adminPass" placeholder="Enter Admin Password">
                <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="verifyAdmin()">Access Dashboard</button>
                <p style="font-size:12px; cursor:pointer; color:var(--primary); margin-top: 15px;" onclick="toggleLogin(false)">← Switch to Staff Login</p>
            </div>

            <div id="staff-login-box">
                <label style="font-size: 11px; text-align: left; display: block; color: var(--slate-400); font-weight: 600;">SELECT PERSONNEL</label>
                <select id="userSelect"></select>
                <button class="btn btn-success" style="width:100%; margin-top: 10px; box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);" onclick="login('USER')">Clock In / Out</button>
                <div style="margin: 20px 0; border-top: 1px solid var(--slate-100); position: relative;">
                    <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; font-size: 10px; color: var(--slate-400);">OR</span>
                </div>
                <button class="btn btn-outline" style="width:100%" onclick="toggleLogin(true)">Administrator Access</button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <h2>PSO PALAWAN<br><span style="color:var(--slate-400); font-size: 0.75rem; font-weight: 500;">WFH Management System</span></h2>
        
        <div id="admin-tools" class="hidden">
            <div class="admin-section-title">Manage Personnel</div>
            <input type="text" id="newStaffName" placeholder="Full Name">
            <button class="btn btn-primary" style="width:100%; margin-bottom: 15px;" onclick="addStaff()">+ Add Member</button>
            <div id="staff-list-admin"></div>
            
            <div class="admin-section-title">Operations</div>
            <button class="btn btn-success" style="width: 100%; margin-bottom: 8px;" onclick="exportToExcel()">Download XLS</button>
            <button class="btn btn-danger" style="width: 100%; margin-top: 10px; opacity: 0.8;" onclick="clearLogs()">Reset System</button>
        </div>

        <div id="user-info" class="hidden" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--slate-100);">
            <p style="font-size: 10px; color: var(--slate-400); margin-bottom: 4px; font-weight: 700;">ACTIVE SESSION</p>
            <h3 id="displayUserName" style="margin: 0; color: var(--dark); font-size: 1rem;">--</h3>
            <button class="btn btn-outline" style="margin-top: 20px; width: 100%; font-size: 10px;" onclick="location.reload()">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <div id="admin-view" class="hidden">
            <div class="card">
                <h4 style="color: var(--dark); margin-top:0; display: flex; align-items: center; gap: 10px;">
                    <span style="background: var(--primary); color: white; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px;">📋</span>
                    Attendance History
                </h4>
                <div style="overflow-x: auto; margin-top: 20px;">
                    <table id="dtrTable">
                        <thead>
                            <tr>
                                <th>Personnel</th>
                                <th>Date</th>
                                <th>In</th>
                                <th>Break Out</th>
                                <th>Break In</th>
                                <th>Out</th>
                                <th>Total</th>
                                <th class="no-export">Action</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card hidden" id="clock-card" style="max-width: 480px; margin: 60px auto;">
            <h3 style="margin-top:0; font-weight: 800;">Time Tracking</h3>
            <p style="color: var(--slate-400); font-size: 13px; margin-bottom: 25px;">Please select your action for today's shift.</p>
            <div style="display: flex; gap: 12px;">
                <button id="btnClockIn" class="btn btn-success" style="flex:1" onclick="clockAction('IN')">Clock In</button>
                <button id="btnBreak" class="btn btn-warning" style="flex:1" onclick="clockAction('BREAK')">Break</button>
                <button id="btnClockOut" class="btn btn-danger" style="flex:1" onclick="clockAction('OUT')">Clock Out</button>
            </div>
            <div style="margin-top: 25px;">
                <p id="statusFeedback"></p>
            </div>
        </div>
    </main>

<script>
    const ADMIN_PASS = "admin123";
    let currentUser = null, userRole = null;
    
    let staff = JSON.parse(localStorage.getItem('entStaff')) || ["John Doe", "Jane Smith"];
    let logs = JSON.parse(localStorage.getItem('entLogs')) || [];
    let active = JSON.parse(localStorage.getItem('entActive')) || {};

    function init() {
        staff.sort();
        const opts = staff.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('userSelect').innerHTML = opts;
        renderStaffList();
    }

    function login(role) {
        userRole = role;
        currentUser = (role === 'ADMIN') ? 'Administrator' : document.getElementById('userSelect').value;
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('displayUserName').innerText = currentUser;
        document.getElementById('user-info').classList.remove('hidden');
        
        if (role === 'ADMIN') {
            document.getElementById('admin-tools').classList.remove('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
        } else {
            document.getElementById('clock-card').classList.remove('hidden');
            updateButtonStates();
        }
        render();
    }

    function exportToExcel() {
        if (logs.length === 0) return alert("No logs available to export.");
        const table = document.getElementById("dtrTable");
        let html = table.outerHTML;
        html = html.replace(/<th class="no-export">.*?<\/th>/g, "");
        html = html.replace(/<td><button.*?<\/button><\/td>/g, "");
        const url = 'data:application/vnd.ms-excel,' + encodeURIComponent(html);
        const link = document.createElement("a");
        link.download = `PSO_Palawan_DTR_${new Date().toLocaleDateString()}.xls`;
        link.href = url;
        link.click();
    }

    function updateButtonStates() {
        if (userRole === 'ADMIN') return;
        const s = active[currentUser];
        const bIn = document.getElementById('btnClockIn');
        const bBr = document.getElementById('btnBreak');
        const bOut = document.getElementById('btnClockOut');

        if (!s) {
            bIn.disabled = false; bIn.innerText = "Clock In";
            bBr.disabled = true; bBr.innerText = "Break";
            bOut.disabled = true; bOut.innerText = "Clock Out";
        } else {
            bIn.disabled = true; bIn.innerText = "Clocked In";
            bBr.disabled = false;
            bBr.innerText = s.onBreak ? "Break In" : "Break Out";
            bOut.disabled = s.onBreak;
            bOut.innerText = "Clock Out";
        }
    }

    function clockAction(type) {
        const now = Date.now();
        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let s = active[currentUser];
        let fb = document.getElementById('statusFeedback');
        fb.style.display = "block";

        if (type === 'IN') {
            active[currentUser] = { 
                start: now, startTime: timeStr, date: new Date().toLocaleDateString(), 
                breakOut: "--", breakIn: "--", breakTotal: 0, onBreak: false 
            };
            fb.innerText = "Shift started at " + timeStr;
        } 
        else if (type === 'BREAK' && s) {
            if (!s.onBreak) {
                s.breakStart = now; s.breakOut = timeStr; s.onBreak = true;
                fb.innerText = "Break started at " + timeStr;
            } else {
                s.breakIn = timeStr; s.breakTotal += (now - s.breakStart); s.onBreak = false;
                fb.innerText = "Break ended at " + timeStr;
            }
        } 
        else if (type === 'OUT' && s) {
            logs.unshift({
                name: currentUser, date: s.date, in: s.startTime,
                bOut: s.breakOut, bIn: s.breakIn, out: timeStr,
                netMs: (now - s.start) - s.breakTotal
            });
            delete active[currentUser];
            fb.innerText = "Shift ended at " + timeStr;
            save(); updateButtonStates();
            return;
        }
        save(); updateButtonStates(); render();
    }

    function render() {
        if (userRole !== 'ADMIN') return;
        document.getElementById('logTableBody').innerHTML = logs.map((l, i) => `
            <tr>
                <td><span style="font-weight:600">${l.name}</span></td>
                <td style="color:var(--slate-400)">${l.date}</td>
                <td style="color:var(--success); font-weight:600">${l.in}</td>
                <td style="color:var(--warning)">${l.bOut}</td>
                <td style="color:var(--warning)">${l.bIn}</td>
                <td style="color:var(--danger); font-weight:600">${l.out}</td>
                <td><span style="background:var(--slate-100); padding:4px 8px; border-radius:4px; font-weight:600">${msToTime(l.netMs)}</span></td>
                <td><button onclick="deleteLog(${i})" style="color:var(--danger); background:none; border:none; cursor:pointer; font-size:18px;">&times;</button></td>
            </tr>`).join('');
    }

    function deleteLog(i) { if(confirm("Delete this log permanently?")) { logs.splice(i, 1); save(); render(); } }

    function clearLogs() {
        const confirmPass = prompt("Enter Admin Password to wipe all data:");
        if (confirmPass === null) return;
        if (confirmPass === ADMIN_PASS) {
            localStorage.clear();
            alert("System Reset Complete.");
            location.reload();
        } else {
            alert("Incorrect password.");
        }
    }

    function addStaff() {
        let n = document.getElementById('newStaffName').value.trim();
        if (n && !staff.includes(n)) { staff.push(n); document.getElementById('newStaffName').value = ""; save(); init(); }
    }
    function deleteStaff(n) { if(confirm(`Remove ${n} from the system?`)) { staff = staff.filter(x => x !== n); save(); init(); } }
    function renderStaffList() {
        document.getElementById('staff-list-admin').innerHTML = staff.map(s => `
            <div class="staff-tag"><span>${s}</span><button onclick="deleteStaff('${s}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">&times;</button></div>`).join('');
    }
    function msToTime(ms) {
        let h = Math.floor(ms / 3600000);
        let m = Math.floor((ms % 3600000) / 60000);
        return `${h}h ${m}m`;
    }
    function save() {
        localStorage.setItem('entStaff', JSON.stringify(staff));
        localStorage.setItem('entLogs', JSON.stringify(logs));
        localStorage.setItem('entActive', JSON.stringify(active));
    }
    function verifyAdmin() { if (document.getElementById('adminPass').value === ADMIN_PASS) login('ADMIN'); else alert("Invalid Credentials"); }
    function toggleLogin(isA) { 
        document.getElementById('admin-login-box').classList.toggle('hidden', !isA); 
        document.getElementById('staff-login-box').classList.toggle('hidden', isA); 
    }
    init();
</script>
</body>
</html>
